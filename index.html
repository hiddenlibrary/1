<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Library | Philosophy Digital Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
            --bg-dark: #050505;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1a 0%, var(--bg-dark) 100%);
            color: #e0e0e0;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        header {
            height: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Cinzel', serif;
            color: #fff;
            letter-spacing: 3px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .logo span { color: var(--accent); }

        .search-container {
            position: relative;
        }

        .search-bar {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
            width: 250px;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--accent);
            width: 300px;
            background: rgba(255,255,255,0.1);
        }

        .hero {
            text-align: center;
            padding: 120px 20px;
            background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.03));
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        .hero p {
            color: #888;
            letter-spacing: 4px;
            font-size: 0.9rem;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 60px;
            padding: 50px 8%;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .book-preview {
            height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            background: #000;
        }

        .book-preview::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
        }

        .book-preview h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            margin: 0;
            color: #fff;
            z-index: 2;
        }

        .symbol {
            font-size: 40px;
            color: var(--accent);
            opacity: 0.4;
            z-index: 2;
        }

        .author-tag {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            font-size: 1.1rem;
            z-index: 2;
        }

        .card-info {
            padding: 30px;
            background: #0a0a0a;
        }

        .card-info h4 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #fff;
            font-weight: 400;
        }

        .price-tag {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.4rem;
            display: block;
            margin-bottom: 20px;
        }

        .btn-buy {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            font-size: 0.8rem;
        }

        .btn-buy:hover {
            background: var(--accent);
            color: #000;
        }

        footer {
            padding: 120px 5% 60px;
            text-align: center;
            background: #000;
            border-top: 1px solid var(--border);
        }

        .rights-box {
            display: inline-block;
            padding: 30px 60px;
            border: 1px solid var(--border);
        }

        .designer-names {
            color: var(--accent);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .copy-text {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">HIDDEN <span>LIBRARY</span></div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="SEARCH ARCHIVE...">
    </div>
</header>

<div class="hero">
    <h1>THE MASTERPIECES</h1>
    <p>DIGITAL COLLECTION BY EL AOUYNI & DRGHOUI</p>
</div>

<div class="grid" id="mainGrid"></div>

<footer>
    <div class="rights-box">
        <div style="font-size: 0.7rem; color: #888; letter-spacing: 3px; text-transform: uppercase;">Engineered & Designed by</div>
        <div class="designer-names">
            CHARAFEDDINE EL AOUYNI & AMINE DRGHOUI
        </div>
    </div>
    <div class="copy-text">© 2026 HIDDEN LIBRARY ARCHIVE. ALL RIGHTS RESERVED.</div>
</footer>

<script>
    const books = [
        { t: "The Republic", a: "Plato" }, { t: "Meditations", a: "Marcus Aurelius" }, { t: "Beyond Good and Evil", a: "Nietzsche" },
        { t: "Nicomachean Ethics", a: "Aristotle" }, { t: "Critique of Pure Reason", a: "Kant" }, { t: "Being and Nothingness", a: "Sartre" },
        { t: "The Social Contract", a: "Rousseau" }, { t: "Leviathan", a: "Hobbes" }, { t: "Ethics", a: "Spinoza" },
        { t: "The Myth of Sisyphus", a: "Camus" }, { t: "The Prince", a: "Machiavelli" }, { t: "Fear and Trembling", a: "Kierkegaard" },
        { t: "Tao Te Ching", a: "Lao Tzu" }, { t: "The Art of War", a: "Sun Tzu" }, { t: "Confessions", a: "St. Augustine" },
        { t: "Summa Theologica", a: "Aquinas" }, { t: "Phenomenology of Spirit", a: "Hegel" }, { t: "The World as Will", a: "Schopenhauer" },
        { t: "Human Understanding", a: "David Hume" }, { t: "Two Treatises", a: "John Locke" }, { t: "On Liberty", a: "John Stuart Mill" },
        { t: "Communist Manifesto", a: "Karl Marx" }, { t: "Das Kapital", a: "Karl Marx" }, { t: "Man's Search for Meaning", a: "Frankl" },
        { t: "The Second Sex", a: "Beauvoir" }, { t: "History of Philosophy", a: "Russell" }, { t: "Tractatus", a: "Wittgenstein" },
        { t: "Being and Time", a: "Heidegger" }, { t: "The Stranger", a: "Camus" }, { t: "Enchiridion", a: "Epictetus" },
        { t: "Letters from a Stoic", a: "Seneca" }, { t: "Sickness Unto Death", a: "Kierkegaard" }, { t: "Civilization Discontents", a: "Freud" },
        { t: "Interpretation of Dreams", a: "Freud" }, { t: "Dialectic Enlightenment", a: "Adorno" }, { t: "Discipline and Punish", a: "Foucault" },
        { t: "The Order of Things", a: "Foucault" }, { t: "Simulacra & Simulation", a: "Baudrillard" }, { t: "Of Grammatology", a: "Derrida" },
        { t: "The Human Condition", a: "Arendt" }, { t: "The Open Society", a: "Popper" }, { t: "Structure of Revolutions", a: "Kuhn" },
        { t: "A Theory of Justice", a: "Rawls" }, { t: "Anarchy, State, Utopia", a: "Nozick" }, { t: "The Selfish Gene", a: "Dawkins" },
        { t: "Incoherence Philosophers", a: "Al-Ghazali" }, { t: "The Muqaddimah", a: "Ibn Khaldun" }, { t: "The Decisive Treatise", a: "Ibn Rushd" },
        { t: "Hayy ibn Yaqdhan", a: "Ibn Tufail" }, { t: "Proslogion", a: "Anselm" }, { t: "The City of God", a: "Augustine" },
        { t: "Utopia", a: "Thomas More" }, { t: "Novum Organum", a: "Francis Bacon" }, { t: "Candide", a: "Voltaire" },
        { t: "Philosophical Dictionary", a: "Voltaire" }, { t: "Wealth of Nations", a: "Adam Smith" }, { t: "Common Sense", a: "Thomas Paine" },
        { t: "Rights of Man", a: "Thomas Paine" }, { t: "Walden", a: "Thoreau" }, { t: "Civil Disobedience", a: "Thoreau" },
        { t: "Self-Reliance", a: "Emerson" }, { t: "Pragmatism", a: "William James" }, { t: "Democracy & Education", a: "Dewey" },
        { t: "Language, Truth, Logic", a: "A.J. Ayer" }, { t: "Truth and Method", a: "Gadamer" }, { t: "Minima Moralia", a: "Adorno" },
        { t: "One-Dimensional Man", a: "Marcuse" }, { t: "Eros and Civilization", a: "Marcuse" }, { t: "The Rebel", a: "Camus" },
        { t: "Existentialism Humanism", a: "Sartre" }, { t: "Ethics of Ambiguity", a: "Beauvoir" }, { t: "Madness & Civilization", a: "Foucault" },
        { t: "History of Sexuality", a: "Foucault" }, { t: "Anti-Oedipus", a: "Deleuze" }, { t: "A Thousand Plateaus", a: "Deleuze" },
        { t: "Difference Repetition", a: "Deleuze" }, { t: "Writing and Difference", a: "Derrida" }, { t: "Specters of Marx", a: "Derrida" },
        { t: "Liquid Modernity", a: "Bauman" }, { t: "Society of Spectacle", a: "Debord" }, { t: "Pedagogy of Oppressed", a: "Freire" },
        { t: "Wretched of the Earth", a: "Fanon" }, { t: "Black Skin White Masks", a: "Fanon" }, { t: "Orientalism", a: "Edward Said" },
        { t: "Gender Trouble", a: "Judith Butler" }, { t: "Justice as Fairness", a: "John Rawls" }, { t: "Postmodern Condition", a: "Lyotard" },
        { t: "Mirror of Nature", a: "Rorty" }, { t: "Monadology", a: "Leibniz" }, { t: "New Science", a: "Vico" },
        { t: "Book of Healing", a: "Avicenna" }, { t: "Guide for Perplexed", a: "Maimonides" }, { t: "The Will to Power", a: "Nietzsche" },
        { t: "Ecce Homo", a: "Nietzsche" }, { t: "Minima Moralia", a: "Adorno" }, { t: "Negative Dialectics", a: "Adorno" },
        { t: "Being and Time", a: "Heidegger" }, { t: "Idea of Justice", a: "Amartya Sen" }, { t: "Ethics", a: "Spinoza" },
        { t: "The Sickness Unto Death", a: "Kierkegaard" }
    ];

    const grid = document.getElementById('mainGrid');
    const search = document.getElementById('searchInput');

    function render(data) {
        grid.innerHTML = data.map(b => `
            <div class="card">
                <div class="book-preview">
                    <h3>${b.t}</h3>
                    <div class="symbol">🗃️</div>
                    <div class="author-tag">${b.a}</div>
                </div>
                <div class="card-info">
                    <h4>${b.t}</h4>
                    <span class="price-tag">135 DH</span>
                    <button class="btn-buy">ADD TO ARCHIVE</button>
                </div>
            </div>
        `).join('');
    }

    search.addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        render(books.filter(b => b.t.toLowerCase().includes(val) || b.a.toLowerCase().includes(val)));
    });

    render(books);
</script>
</body>
</html>
