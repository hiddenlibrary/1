<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Cogito | Premier Archive</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #b5945b;
            --dark: #0f0f0f;
            --soft-white: #fcfaf5;
            --accent: #d4af37;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--soft-white);
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* Fixed Navigation */
        nav.top-nav {
            background: var(--dark);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo { color: white; font-size: 1.5rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); font-weight: bold; }

        .search-container { position: relative; width: 300px; }
        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: #222;
            color: white;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        .hero h2 { font-size: 3.5rem; margin: 0; font-weight: 300; }
        .hero p { font-style: italic; color: var(--gold); font-size: 1.2rem; }

        /* Grid System */
        .main-content { padding: 50px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 40px;
        }

        /* Book Card Luxury Style */
        .card {
            background: white;
            border: 1px solid #eee;
            transition: 0.4s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: var(--gold);
        }

        .img-holder {
            width: 100%;
            height: 350px;
            overflow: hidden;
            position: relative;
        }

        .img-holder img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gold);
            color: black;
            padding: 5px 10px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .details { padding: 20px; flex-grow: 1; }
        .details h3 { font-size: 1.1rem; margin: 0 0 10px; color: var(--dark); height: 45px; overflow: hidden; }
        .details p { color: #888; font-size: 0.9rem; margin: 0; }
        
        .purchase-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f5f5f5;
        }

        .price { font-weight: bold; color: var(--gold); font-size: 1.2rem; }
        
        .btn-cart {
            background: var(--dark);
            color: white;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-cart:hover { background: var(--gold); color: black; }

        footer {
            background: var(--dark);
            color: #555;
            padding: 50px 5%;
            text-align: center;
            border-top: 10px solid #1a1a1a;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">BEYOND THE <span>COGITO</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by title or author..." onkeyup="searchBooks()">
        </div>
    </nav>

    <div class="hero">
        <h2>The Eternal Library</h2>
        <p>"I think, therefore I am." — René Descartes</p>
    </div>

    <div class="main-content">
        <div class="grid" id="bookGrid">
            </div>
    </div>

    <footer>
        <div style="color: #bbb; margin-bottom: 20px;">
            <i class="fab fa-instagram"></i> &nbsp; <i class="fab fa-twitter"></i> &nbsp; <i class="fab fa-facebook"></i>
        </div>
        <p>&copy; 2026 Academic Research Project | FLSHM Mohammedia</p>
        <p style="font-size: 0.7rem;">Designed for Department of English Studies</p>
    </footer>

    <script>
        const books = [
            {t: "The Republic", a: "Plato", tag: "Classic"}, {t: "Meditations", a: "Marcus Aurelius", tag: "Stoicism"},
            {t: "Thus Spoke Zarathustra", a: "Friedrich Nietzsche", tag: "Existentialism"}, {t: "Critique of Pure Reason", a: "Immanuel Kant", tag: "Idealism"},
            {t: "The Stranger", a: "Albert Camus", tag: "Absurdism"}, {t: "Being and Nothingness", a: "Jean-Paul Sartre", tag: "Existentialism"},
            {t: "The Prince", a: "Machiavelli", tag: "Politics"}, {t: "Discourse on Method", a: "Descartes", tag: "Rationalism"},
            {t: "The Art of War", a: "Sun Tzu", tag: "Strategy"}, {t: "Beyond Good and Evil", a: "Nietzsche", tag: "Philosophy"},
            {t: "Phenomenology of Spirit", a: "Hegel", tag: "Idealism"}, {t: "The Second Sex", a: "De Beauvoir", tag: "Feminism"},
            {t: "Metaphysics", a: "Aristotle", tag: "Classic"}, {t: "Ethics", a: "Spinoza", tag: "Rationalism"},
            {t: "The Communist Manifesto", a: "Karl Marx", tag: "Politics"}, {t: "Being and Time", a: "Heidegger", tag: "Existentialism"},
            {t: "The Social Contract", a: "Rousseau", tag: "Politics"}, {t: "Man's Search for Meaning", a: "Frankl", tag: "Psychology"},
            {t: "A Theory of Justice", a: "John Rawls", tag: "Ethics"}, {t: "1984", a: "George Orwell", tag: "Literature"}
            // Add more titles here to reach 100
        ];

        const grid = document.getElementById('bookGrid');
        const imgLinks = ["51-m4-JNo6L", "51p2Mv8yv1L", "51p8K2mH8fL", "41-N0E7I69L", "41RizG-hAnL", "41e-G6I+4sL", "51lR6f8Vq2L", "41o5KkE-G-L", "51m-Z0vW2TL", "51+UonP7S1L"];

        function render() {
            grid.innerHTML = "";
            for (let i = 0; i < 100; i++) {
                const b = books[i % books.length];
                const img = imgLinks[i % imgLinks.length];
                grid.innerHTML += `
                    <div class="card" data-title="${b.t.toLowerCase()}">
                        <div class="badge">${b.tag}</div>
                        <div class="img-holder">
                            <img src="https://m.media-amazon.com/images/I/${img}.jpg" alt="Book">
                        </div>
                        <div class="details">
                            <h3>${b.t}</h3>
                            <p>By ${b.a}</p>
                            <div class="purchase-info">
                                <span class="price">${110 + (i * 2)} DH</span>
                                <button class="btn-cart"><i class="fas fa-cart-plus"></i> ADD</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function searchBooks() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title');
                cards[i].style.display = title.includes(input) ? "flex" : "none";
            }
        }

        render();
    </script>
</body>
</html>
