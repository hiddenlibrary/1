<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Cogito | 100 Unique Masterpieces</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #b5945b; --dark: #121212; --ivory: #fdfcf9; }
        body { font-family: 'Georgia', serif; background-color: var(--ivory); margin: 0; padding: 0; color: #333; }
        nav { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); }
        .logo { color: white; font-size: 1.4rem; letter-spacing: 2px; text-decoration: none; text-transform: uppercase; font-weight: bold; }
        .logo span { color: var(--gold); }
        .search-box { background: #222; border: 1px solid #444; padding: 10px 20px; border-radius: 30px; color: white; width: 250px; outline: none; }
        .hero { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1200&q=80'); background-size: cover; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .main-container { padding: 50px 5%; max-width: 1400px; margin: auto; min-height: 500px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .book-card { background: white; border: 1px solid #eee; transition: 0.3s; display: flex; flex-direction: column; overflow: hidden; }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .cover-area { height: 300px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px 15px; text-align: center; color: white; position: relative; box-sizing: border-box; border-bottom: 5px solid rgba(0,0,0,0.2); }
        .cover-title { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; margin-top: 15px; line-height: 1.2; }
        .cover-author { font-size: 0.75rem; font-style: italic; margin-bottom: 15px; opacity: 0.9; }
        .book-details { padding: 15px; }
        .book-details h3 { font-size: 0.9rem; margin: 0 0 5px; color: #111; height: 2.4em; overflow: hidden; }
        .price-tag { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-weight: bold; color: var(--gold); }
        .btn-buy { background: var(--dark); color: white; border: none; padding: 7px 10px; font-size: 0.75rem; cursor: pointer; }
        footer { background: var(--dark); color: #777; padding: 50px 20px; text-align: center; border-top: 5px solid var(--gold); }
        .names { color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">BEYOND THE <span>COGITO</span></a>
        <input type="text" class="search-box" id="searchBar" placeholder="Search 100 unique books..." onkeyup="filterBooks()">
    </nav>
    <div class="hero">
        <h1>The Eternal Library</h1>
        <p>100 Masterpieces of Human Thought</p>
    </div>
    <div class="main-container">
        <div class="grid" id="libraryGrid"></div>
    </div>
    <footer>
        <p>PROJECT DEVELOPED BY:</p>
        <div class="names">AMINE DRGHOUI & CHARAFEDDINE EL AOUYNI</div>
        <p style="margin-top: 20px;">&copy; 2026 Academic Project | FLSHM Mohammedia</p>
    </footer>

    <script>
        const library = [
            {t: "The Republic", a: "Plato"}, {t: "Meditations", a: "Marcus Aurelius"}, {t: "Thus Spoke Zarathustra", a: "Nietzsche"},
            {t: "Critique of Pure Reason", a: "Kant"}, {t: "The Stranger", a: "Albert Camus"}, {t: "Being and Nothingness", a: "Sartre"},
            {t: "The Prince", a: "Machiavelli"}, {t: "Ethics", a: "Spinoza"}, {t: "The Art of War", a: "Sun Tzu"},
            {t: "Sophie's World", a: "Gaarder"}, {t: "The Social Contract", a: "Rousseau"}, {t: "Leviathan", a: "Hobbes"},
            {t: "Beyond Good and Evil", a: "Nietzsche"}, {t: "Utopia", a: "Thomas More"}, {t: "The Poetics", a: "Aristotle"},
            {t: "Discourse on Method", a: "Descartes"}, {t: "Candide", a: "Voltaire"}, {t: "The Trial", a: "Franz Kafka"},
            {t: "Crime and Punishment", a: "Fyodor Dostoevsky"}, {t: "The Brothers Karamazov", a: "Fyodor Dostoevsky"}, 
            {t: "The Idiot", a: "Fyodor Dostoevsky"}, {t: "Notes from Underground", a: "Fyodor Dostoevsky"},
            {t: "Demons", a: "Fyodor Dostoevsky"}, {t: "The Gambler", a: "Fyodor Dostoevsky"},
            {t: "The Plague", a: "Albert Camus"}, {t: "The Fall", a: "Albert Camus"}, {t: "The Myth of Sisyphus", a: "Albert Camus"},
            {t: "A Happy Death", a: "Albert Camus"}, {t: "Exile and the Kingdom", a: "Albert Camus"},
            {t: "The Metamorphosis", a: "Franz Kafka"}, {t: "The Castle", a: "Franz Kafka"}, {t: "Amerika", a: "Franz Kafka"},
            {t: "In the Penal Colony", a: "Franz Kafka"}, {t: "The Great Wall of China", a: "Franz Kafka"},
            {t: "Gulliver's Travels", a: "Swift"}, {t: "The Iliad", a: "Homer"}, {t: "The Odyssey", a: "Homer"},
            {t: "Divine Comedy", a: "Dante"}, {t: "Hamlet", a: "Shakespeare"}, {t: "The Wealth of Nations", a: "Adam Smith"},
            {t: "Capital", a: "Karl Marx"}, {t: "The Interpretation of Dreams", a: "Freud"}, {t: "On Liberty", a: "John Stuart Mill"},
            {t: "War and Peace", a: "Tolstoy"}, {t: "Moby Dick", a: "Melville"},
            {t: "The Great Gatsby", a: "Fitzgerald"}, {t: "Ulysses", a: "James Joyce"}, {t: "Waiting for Godot", a: "Beckett"},
            {t: "The Open Society", a: "Karl Popper"}, {t: "The Rebel", a: "Albert Camus"}, {t: "Phaedo", a: "Plato"},
            {t: "The Symposium", a: "Plato"}, {t: "Nicomachean Ethics", a: "Aristotle"}, {t: "Organon", a: "Aristotle"},
            {t: "Confessions", a: "Saint Augustine"}, {t: "Summa Theologica", a: "Aquinas"}, {t: "Novum Organum", a: "Francis Bacon"},
            {t: "Human, All Too Human", a: "Nietzsche"}, {t: "The Gay Science", a: "Nietzsche"}, {t: "Ecce Homo", a: "Nietzsche"},
            {t: "Walden", a: "Thoreau"}, {t: "Self-Reliance", a: "Emerson"}, {t: "Common Sense", a: "Thomas Paine"},
            {t: "The Age of Reason", a: "Thomas Paine"}, {t: "The Rights of Man", a: "Thomas Paine"}, {t: "Anarchy, State, and Utopia", a: "Nozick"},
            {t: "A Theory of Justice", a: "John Rawls"}, {t: "The Road to Serfdom", a: "Hayek"},
            {t: "The Wretched of the Earth", a: "Frantz Fanon"}, {t: "Black Skin, White Masks", a: "Frantz Fanon"}, {t: "Simulacra and Simulation", a: "Baudrillard"},
            {t: "The History of Madness", a: "Foucault"}, {t: "Discipline and Punish", a: "Foucault"}, {t: "The Birth of the Clinic", a: "Foucault"},
            {t: "Mythologies", a: "Roland Barthes"}, {t: "Of Grammatology", a: "Derrida"}, {t: "Writing and Difference", a: "Derrida"},
            {t: "The Postmodern Condition", a: "Lyotard"}, {t: "Anti-Oedipus", a: "Deleuze & Guattari"}, {t: "A Thousand Plateaus", a: "Deleuze"},
            {t: "Minima Moralia", a: "Adorno"}, {t: "The Culture Industry", a: "Adorno"}, {t: "Eros and Civilization", a: "Marcuse"},
            {t: "One-Dimensional Man", a: "Marcuse"}, {t: "The Ego and the Id", a: "Freud"}, {t: "Civilization and Its Discontents", a: "Freud"},
            {t: "Totem and Taboo", a: "Freud"}, {t: "Archetypes of the Collective", a: "Carl Jung"}, {t: "The Hero with a Thousand Faces", a: "Campbell"},
            {t: "The Golden Bough", a: "Frazer"}, {t: "The Structure of Scientific Revolutions", a: "Kuhn"}, {t: "Silent Spring", a: "Rachel Carson"},
            {t: "The Double Helix", a: "James Watson"}, {t: "A Brief History of Time", a: "Hawking"}, {t: "The Selfish Gene", a: "Dawkins"},
            {t: "The Tipping Point", a: "Gladwell"}, {t: "Thinking, Fast and Slow", a: "Kahneman"}, {t: "Sapiens", a: "Harari"},
            {t: "The Prophet", a: "Kahlil Gibran"}, {t: "The Alchemist", a: "Coelho"}, {t: "1984", a: "George Orwell"},
            {t: "Animal Farm", a: "George Orwell"}, {t: "Brave New World", a: "Huxley"}, {t: "Fahrenheit 451", a: "Bradbury"},
            {t: "The Doors of Perception", a: "Huxley"}, {t: "Siddhartha", a: "Hermann Hesse"}, {t: "Steppenwolf", a: "Hermann Hesse"},
            {t: "The Glass Bead Game", a: "Hermann Hesse"}, {t: "Nausea", a: "Sartre"}, {t: "No Exit", a: "Sartre"}
        ];

        const colors = ["#2c3e50", "#7b1fa2", "#b71c1c", "#1b5e20", "#0d47a1", "#e65100", "#37474f", "#006064", "#212121", "#4a148c"];
        
        function generate() {
            const container = document.getElementById('libraryGrid');
            if(!container) return;
            
            container.innerHTML = "";
            library.forEach((book, i) => {
                const color = colors[i % colors.length];
                container.innerHTML += `
                    <div class="book-card" data-search="${book.t.toLowerCase()} ${book.a.toLowerCase()}">
                        <div class="cover-area" style="background-color: ${color}">
                            <div class="cover-title">${book.t}</div>
                            <i class="fas fa-feather-alt" style="opacity:0.2; font-size: 2rem;"></i>
                            <div class="cover-author">${book.a}</div>
                        </div>
                        <div class="book-details">
                            <h3>${book.t}</h3>
                            <div class="price-tag"><span>${100 + i} DH</span><button class="btn-buy">ADD</button></div>
                        </div>
                    </div>`;
            });
        }

        function filterBooks() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let items = document.getElementsByClassName('book-card');
            for (let item of items) { 
                item.style.display = item.dataset.search.includes(input) ? "block" : "none"; 
            }
        }

        window.onload = generate;
    </script>
</body>
</html>
