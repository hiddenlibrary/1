        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Library | Philosophical Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcf0;
            --main: #000000;
            --accent: #ff4d00; /* Sharp Neo-Brutalism Orange */
            --border: 3px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--main);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            border-bottom: var(--border);
            padding: 60px 5%;
            text-align: center;
            background: #fff;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
        }

        header p {
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 10px;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* --- Grid System --- */
        .container {
            width: 90%;
            margin: 60px auto;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        /* --- Book Card --- */
        .book-card {
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 15px;
            transition: 0.2s ease-in-out;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--accent);
        }

        .book-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-bottom: var(--border);
            margin-bottom: 15px;
            filter: grayscale(20%);
        }

        .book-info h3 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            font-family: 'Playfair Display', serif;
        }

        .author-tag {
            background: var(--main);
            color: white;
            padding: 2px 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
        }

        .btn-buy {
            margin-top: auto;
            background: var(--accent);
            color: #fff;
            border: var(--border);
            padding: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-buy:hover {
            background: #000;
        }

        /* --- Modal (Details) --- */
        .modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg);
            border: 5px solid #000;
            box-shadow: 20px 20px 0px var(--accent);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            display: flex;
            gap: 40px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            font-weight: 800;
        }

        /* --- Reviews --- */
        .reviews {
            margin-top: 100px;
            border-top: var(--border);
            padding: 60px 5%;
            background: #000;
            color: #fff;
        }

        .review-card {
            border: 2px solid #fff;
            padding: 25px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .review-card:hover {
            background: var(--accent);
        }

        /* --- Footer --- */
        footer {
            padding: 80px 5%;
            background: #fff;
            border-top: var(--border);
            text-align: center;
        }

        .credits {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .names {
            color: var(--accent);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 3rem; }
            .modal-content { flex-direction: column; overflow-y: auto; height: 90vh; }
        }
    </style>
</head>
<body>

    <header>
        <h1>HIDDEN LIBRARY</h1>
        <p>A Curated Collection of Existentialist & Philosophical Works</p>
    </header>

    <div class="container">
        <div class="book-grid" id="bookGrid">
            <!-- 100 Books injected here -->
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="bookModal">
        <div class="modal-content" id="modalBody">
            <!-- Content Injected -->
        </div>
    </div>

    <section class="reviews">
        <h2 style="font-size: 3rem; margin-bottom: 40px; font-family: 'Playfair Display';">Critical Reviews</h2>
        <div id="reviewGrid"></div>
    </section>

    <footer>
        <p>Academic Project Developed By</p>
        <div class="credits">
            <span class="names">CHARAFEDDINE EL AOUYNI</span> & <span class="names">AMINE DRGHOUI</span>
        </div>
        <p>© 2024 Hidden Library - For Educational Purposes Only</p>
    </footer>

    <script>
        const authors = ["Friedrich Nietzsche", "Fyodor Dostoevsky", "Franz Kafka", "Albert Camus", "Jean-Paul Sartre", "Arthur Schopenhauer", "Søren Kierkegaard"];
        const titles = [
            "The Stranger", "Crime and Punishment", "The Trial", "Thus Spoke Zarathustra", "Nausea", 
            "The Myth of Sisyphus", "The Brothers Karamazov", "Beyond Good and Evil", "The Metamorphosis", 
            "No Exit", "The Plague", "The Castle", "The Idiot", "Fear and Trembling", "The Fall"
        ];

        const descriptions = [
            "A deep dive into the absurdity of existence and the indifference of the universe.",
            "An intense psychological exploration of guilt, morality, and the search for redemption.",
            "A masterpiece of existential dread, highlighting the struggle against incomprehensible powers.",
            "Challenging traditional morality and introducing the concept of the Übermensch."
        ];

        // Generate 100 Books
        const bookGrid = document.getElementById('bookGrid');
        for (let i = 1; i <= 100; i++) {
            const author = authors[Math.floor(Math.random() * authors.length)];
            const title = titles[Math.floor(Math.random() * titles.length)];
            const imgId = 100 + i; // Different image for each book

            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="https://picsum.photos/seed/${imgId}/400/600" alt="Book Cover">
                <div class="author-tag">${author}</div>
                <h3>${title}</h3>
                <p style="margin-bottom:15px; font-size:0.9rem; opacity:0.7">Limited Edition | Hardcover</p>
                <button class="btn-buy" onclick="openModal('${title}', '${author}', ${imgId})">View Details</button>
            `;
            bookGrid.appendChild(card);
        }

        function openModal(title, author, imgId) {
            const modal = document.getElementById('bookModal');
            const body = document.getElementById('modalBody');
            const desc = descriptions[Math.floor(Math.random() * descriptions.length)];

            body.innerHTML = `
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <img src="https://picsum.photos/seed/${imgId}/400/600" style="width:350px; border:var(--border)">
                <div>
                    <span class="author-tag" style="background:var(--accent)">Rare Philosophical Find</span>
                    <h2 style="font-size:3rem; font-family:'Playfair Display'">${title}</h2>
                    <h4 style="margin-bottom:20px">Author: ${author}</h4>
                    <p style="font-size:1.1rem; line-height:1.8; margin-bottom:20px">${desc} This edition features exclusive commentary and historical context of the philosophical movement.</p>
                    <p style="font-size:1.5rem; font-weight:800">$29.99</p>
                    <button class="btn-buy" style="width:100%; margin-top:20px; font-size:1.2rem">Add to Collection</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookModal').style.display = 'none';
        }

        // Logical English Reviews
        const reviewsData = [
            {name: "Prof. Julian Harrison", text: "The Hidden Library curates the most profound translations of Dostoevsky I've ever encountered. Essential for any philosophy student."},
            {name: "Eleanor Vance", text: "The Neo-Brutalism design of the site reflects the harsh truths of Kafka's literature perfectly. A masterpiece of web design."},
            {name: "Marcus Thorne", text: "As a collector, I find their 'Rare Find' section invaluable. The quality of the prints matches the weight of the ideas within."},
            {name: "Dr. Sarah Jenkins", text: "Finally, a bookstore that treats philosophy with the grit and boldness it deserves. Excellent navigation and selection."}
        ];

        const revGrid = document.getElementById('reviewGrid');
        reviewsData.forEach(r => {
            revGrid.innerHTML += `
                <div class="review-card">
                    <h4 style="color:var(--accent)">${r.name}</h4>
                    <p style="font-style:italic; margin-top:10px">"${r.text}"</p>
                </div>
            `;
        });

        // Close modal on outside click
        window.onclick = (e) => { if(e.target == document.getElementById('bookModal')) closeModal(); }
    </script>
</body>
</html>
