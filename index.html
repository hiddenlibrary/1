<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Cogito | Premier Library</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #b5945b; --bg: #0a0a0a; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Stunning Hero (Like Gemini Canvas) */
        .canvas-hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), 
                        url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; animation: fadeIn 2s ease-in;
        }
        .canvas-hero h1 { font-size: 5rem; letter-spacing: -2px; margin: 0; font-weight: 800; text-transform: uppercase; }
        .canvas-hero p { font-size: 1.2rem; opacity: 0.7; letter-spacing: 5px; margin-top: 10px; }

        /* Grid Design */
        .grid-wrapper { padding: 100px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        
        .modern-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .modern-card:hover { 
            transform: scale(1.05) translateY(-10px); 
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        
        .img-container { height: 400px; position: relative; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .modern-card:hover img { transform: scale(1.1); filter: brightness(1.2); }
        
        .card-info { padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .card-info h3 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }
        .card-info span { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; display: block; margin-top: 5px; }

        /* Footer - Ultra Modern */
        footer { border-top: 1px solid rgba(255,255,255,0.1); padding: 100px 5%; text-align: center; }
        .footer-names { font-size: 2.5rem; font-weight: 900; background: linear-gradient(45deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <section class="canvas-hero">
        <p>A DIGITAL ODYSSEY</p>
        <h1>BEYOND THE COGITO</h1>
        <div style="margin-top: 30px; width: 50px; height: 2px; background: var(--accent);"></div>
    </section>

    <div class="grid-wrapper">
        <div class="grid" id="libraryGrid"></div>
    </div>

    <footer>
        <div style="opacity: 0.5; margin-bottom: 20px; letter-spacing: 3px;">DESIGNED BY ARCHITECTS:</div>
        <div class="footer-names">AMINE & CHARAFEDDINE</div>
        <p style="margin-top: 40px; opacity: 0.4;">FLSHM MOHAMMEDIA | ACADEMIC PROJECT 2026</p>
    </footer>

    <script>
        const books = [
            {t: "The Republic", a: "Plato", img: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=1000"},
            {t: "Meditations", a: "Marcus Aurelius", img: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1000"},
            {t: "The Stranger", a: "Albert Camus", img: "https://images.unsplash.com/photo-1543004218-283020fe3fdf?q=80&w=1000"},
            {t: "1984", a: "George Orwell", img: "https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=1000"}
        ];

        // Fill up to 100 books with dynamic images
        for(let i=5; i<=100; i++) {
            books.push({t: "Masterpiece Vol. " + i, a: "Great Thinker", img: `https://picsum.photos/seed/${i}/800/1200`});
        }

        const grid = document.getElementById('libraryGrid');
        books.forEach(b => {
            grid.innerHTML += `
                <div class="modern-card">
                    <div class="img-container">
                        <img src="${b.img}" alt="${b.t}">
                        <div class="card-info">
                            <h3>${b.t}</h3>
                            <span>${b.a}</span>
                        </div>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
