<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Library | Philosophy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #0a0a0a;
            --card-white: #ffffff;
        }

        body {
            background-color: #f9f9f9;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        /* Header */
        header {
            background-color: var(--dark-bg);
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .logo span {
            color: var(--gold);
            font-size: 1.3rem;
            display: block;
        }

        .search-bar {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            width: 250px;
            outline: none;
        }

        /* Grid Layout */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            padding: 60px 5%;
        }

        /* Book Card Style */
        .book-card {
            background: var(--card-white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 4px;
            overflow: hidden;
        }

        .book-card:hover {
            transform: translateY(-15px);
        }

        /* Internal Cover Style (Anti-Distortion) */
        .internal-cover {
            height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 45px 25px;
            text-align: center;
            color: white;
            position: relative;
        }

        .internal-cover h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .internal-cover .feather-icon {
            font-size: 60px;
            opacity: 0.25;
        }

        .internal-cover .author-on-cover {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
        }

        /* Book Info Bottom */
        .book-info {
            padding: 25px;
            position: relative;
        }

        .book-info h4 {
            margin: 0 0 8px 0;
            font-size: 1.05rem;
            color: #111;
            font-weight: 700;
        }

        .price {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .add-cart-btn {
            position: absolute;
            right: 20px;
            bottom: 22px;
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 18px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        /* Colors for Variety */
        .bg-1 { background-color: #1a2a3a; } /* Deep Blue */
        .bg-2 { background-color: #4a3728; } /* Dark Brown */
        .bg-3 { background-color: #2d4628; } /* Forest Green */
        .bg-4 { background-color: #5a1a1a; } /* Burgundy */

        footer {
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 60px 20px;
            border-top: 5px solid var(--gold);
        }

        .footer-credits {
            color: var(--gold);
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        BEYOND THE<br><span>HIDDEN LIBRARY</span>
    </div>
    <input type="text" class="search-bar" placeholder="Search for a book or author...">
</header>

<div class="library-grid" id="library">
    </div>

<footer>
    <p>© 2026 HIDDEN LIBRARY - ALL RIGHTS RESERVED</p>
    <div class="footer-credits">
        DESIGNED BY:<br>
        CHARAFEDDINE EL AOUYNI & AMINE DRGHOUI
    </div>
</footer>

<script>
    const books = [
        { title: "The Republic", author: "Plato", price: "135 DH" },
        { title: "Meditations", author: "Marcus Aurelius", price: "120 DH" },
        { title: "Beyond Good and Evil", author: "Friedrich Nietzsche", price: "150 DH" },
        { title: "Nicomachean Ethics", author: "Aristotle", price: "140 DH" },
        { title: "Critique of Pure Reason", author: "Immanuel Kant", price: "165 DH" },
        { title: "Being and Nothingness", author: "Jean-Paul Sartre", price: "180 DH" },
        { title: "The Social Contract", author: "Jean-Jacques Rousseau", price: "115 DH" },
        { title: "Leviathan", author: "Thomas Hobbes", price: "130 DH" },
        { title: "Ethics", author: "Baruch Spinoza", price: "145 DH" },
        { title: "The Myth of Sisyphus", author: "Albert Camus", price: "110 DH" },
        
    const fullList = [];
    for(let i=0; i<100; i++) {
        fullList.push(books[i % books.length]); 
    }

    const container = document.getElementById('library');
    
    fullList.forEach((book, index) => {
        const colorClass = `bg-${(index % 4) + 1}`;
        const card = `
            <div class="book-card">
                <div class="internal-cover ${colorClass}">
                    <h3>${book.title}</h3>
                    <div class="feather-icon">🪶</div>
                    <div class="author-on-cover">${book.author}</div>
                </div>
                <div class="book-info">
                    <h4>${book.title}</h4>
                    <span class="price">${book.price}</span>
                    <button class="add-cart-btn">ADD TO CART</button>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });
</script>

</body>
</html>
